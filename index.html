<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Google Map Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&family=Russo+One&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; color: #fff; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; -webkit-user-select: none; user-select: none; touch-action: none;
    background: radial-gradient(120% 90% at 50% 0%, #2a3550 0%, #161d2e 55%, #0c111c 100%); transition: background .5s; }
  body.night { background: radial-gradient(120% 90% at 50% 0%, #11203f 0%, #0a1124 55%, #05080f 100%); }
  #app { position: relative; width: 100vw; height: 100vh; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; cursor: crosshair; }

  #topbar { position: absolute; top: 0; left: 0; right: 0; height: 60px; display: flex; align-items: center; gap: 14px; padding: 0 14px; z-index: 5;
    background: linear-gradient(180deg, rgba(8,11,18,.92), rgba(8,11,18,.5)); border-bottom: 1px solid rgba(255,255,255,.08); backdrop-filter: blur(8px); }
  .logo { font-family: 'Russo One', sans-serif; font-size: 19px; letter-spacing: .5px; }
  .logo b { color: #ffd23f; }
  .spacer { flex: 1; }
  .stat { text-align: center; min-width: 80px; }
  .stat .l { font-size: 10px; letter-spacing: 1.5px; color: #9aa4b2; font-weight: 700; }
  .stat .v { font-family: 'Russo One', sans-serif; font-size: 19px; }
  .stat .v.you { color: #6cb0ff; } .stat .v.best { color: #34d36b; }
  .btn { padding: 9px 14px; border: 0; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 13px; letter-spacing: .5px; }
  .btn.ghost { background: rgba(255,255,255,.12); color: #fff; }
  .btn.primary { background: linear-gradient(180deg,#2ee06a,#1eb455); color: #06210f; }
  .icon-btn { width: 38px; height: 38px; border: 0; border-radius: 10px; background: rgba(255,255,255,.12); color: #fff; font-size: 17px; cursor: pointer; }

  #hint { position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%); background: rgba(8,11,18,.86); border: 1px solid rgba(255,255,255,.12);
    padding: 10px 18px; border-radius: 99px; font-weight: 700; font-size: 13.5px; z-index: 5; backdrop-filter: blur(6px); max-width: 92vw; text-align: center; }
  #hint b { color: #ffd23f; }
  #undoBtn { position: absolute; left: 16px; bottom: 22px; z-index: 6; }
  #reviewBtn { position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%); z-index: 7; }
  .hidden { display: none !important; }

  #overlay { position: absolute; inset: 0; display: grid; place-items: center; background: rgba(5,8,12,.62); backdrop-filter: blur(4px); z-index: 10; }
  .card { width: min(440px,92vw); background: #141b2b; border: 1px solid rgba(255,255,255,.12); border-radius: 20px; padding: 24px; text-align: center; box-shadow: 0 24px 70px rgba(0,0,0,.55); }
  .card h2 { font-family: 'Russo One', sans-serif; font-size: 26px; margin-bottom: 4px; }
  .stars { font-size: 32px; letter-spacing: 6px; margin: 6px 0 12px; }
  .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .res-cell { background: rgba(255,255,255,.05); border-radius: 12px; padding: 12px; }
  .res-cell .rl { font-size: 11px; letter-spacing: 1px; color: #9aa4b2; }
  .res-cell .rv { font-family: 'Russo One', sans-serif; font-size: 22px; margin-top: 3px; }
  .res-cell .rv.you { color: #6cb0ff; } .res-cell .rv.best { color: #34d36b; }
  .card .msg { color: #c3cad6; margin-bottom: 14px; }
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { flex: 1; padding: 13px; font-family: 'Russo One', sans-serif; font-size: 15px; }

  @media (max-width: 660px) {
    .logo { font-size: 14px; } .stat { min-width: 54px; } .stat .v { font-size: 15px; } .stat .l { font-size: 8px; }
    #topbar { gap: 6px; padding: 0 9px; } .btn { padding: 7px 9px; font-size: 11px; } .icon-btn { width: 32px; height: 32px; }
    #hint { font-size: 11.5px; bottom: 14px; padding: 8px 13px; }
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="map"></canvas>
  <div id="topbar">
    <div class="logo">GOOGLE <b>MAP QUEST</b></div>
    <div class="spacer"></div>
    <div class="stat"><div class="l">YOUR DISTANCE</div><div class="v you" id="youDist">0.0 mi</div></div>
    <div class="stat"><div class="l">SHORTEST</div><div class="v best" id="bestDist">0.0 mi</div></div>
    <div class="stat"><div class="l">DELIVERED</div><div class="v" id="deliveredN">0/3</div></div>
    <button class="icon-btn" id="dnBtn" title="Day / night">🌙</button>
    <button class="btn ghost" id="resetBtn">Reset</button>
    <button class="btn primary" id="newBtn">New Map</button>
  </div>
  <div id="hint"></div>
  <button class="btn ghost hidden" id="undoBtn">↶ Undo</button>
  <button class="btn ghost hidden" id="reviewBtn">◂ Back to results</button>
  <div id="overlay" class="hidden"><div class="card" id="card"></div></div>
</div>

<script>
(function () {
  'use strict';

  // ── Grid graph ──
  function key(c, r) { return c + ',' + r; }
  function cr(id) { const p = id.split(','); return [+p[0], +p[1]]; }
  function ek(a, b) { return a < b ? a + '|' + b : b + '|' + a; }
  function makeGrid(cols, rows) {
    const nodes = new Map(), adj = new Map();
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) { const id = key(c, r); nodes.set(id, { id }); adj.set(id, []); }
    const link = (a, b) => { adj.get(a).push(b); adj.get(b).push(a); };
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) { if (c + 1 < cols) link(key(c, r), key(c + 1, r)); if (r + 1 < rows) link(key(c, r), key(c, r + 1)); }
    return { nodes, adj, cols, rows };
  }
  function nodeDist(a, b) { const A = cr(a), B = cr(b); return Math.hypot(A[0] - B[0], A[1] - B[1]); }
  function dijkstra(g, start, goal, closed) {
    const dist = new Map(), prev = new Map(), vis = new Set();
    for (const id of g.nodes.keys()) dist.set(id, Infinity);
    dist.set(start, 0);
    while (true) {
      let u = null, best = Infinity;
      for (const [id, d] of dist) if (!vis.has(id) && d < best) { best = d; u = id; }
      if (u === null || u === goal) break;
      vis.add(u);
      for (const v of g.adj.get(u)) { if (closed && closed.has(ek(u, v))) continue; const nd = dist.get(u) + nodeDist(u, v); if (nd < dist.get(v)) { dist.set(v, nd); prev.set(v, u); } }
    }
    const d = dist.get(goal);
    if (!isFinite(d)) return { dist: Infinity, path: [] };
    const path = []; let cur = goal; while (cur !== undefined) { path.unshift(cur); cur = prev.get(cur); }
    return { dist: d, path };
  }

  // ── State ──
  const canvas = document.getElementById('map');
  const ctx = canvas.getContext('2d');
  let G, baseLayer, state = null;
  const anim = { t: 0, dist: 0, parts: [] };
  let actx = null, lastT = 0;
  const COLS = 7, ROWS = 6;
  const REST = [{ color: '#e8523a', icon: '🍕' }, { color: '#14b8a6', icon: '🍣' }];

  // ── Isometric projection ──
  let TW, TH, ZS, OFFX, OFFY;
  const ISO_R = 0.6, ISO_H = 0.6;
  function iso(wx, wy, wz) { return { x: OFFX + (wx - wy) * TW, y: OFFY + (wx + wy) * TH - (wz || 0) * ZS }; }
  function toScreen(id) { const p = cr(id); return iso(p[0], p[1], 0); }
  function parcelCenter(parcel) { return iso(parcel[0] + 0.5, parcel[1] + 0.5, 0); }
  function screenToWorld(sx, sy) { const a = (sx - OFFX) / TW, b = (sy - OFFY) / TH; return { x: (a + b) / 2, y: (b - a) / 2 }; }
  function sizeCanvas() { const w = canvas.clientWidth || innerWidth || 1000, h = canvas.clientHeight || innerHeight || 700; canvas.width = w; canvas.height = h; return w > 0 && h > 0; }
  function computeFit(w, h) {
    const top = 70, pad = Math.min(w, h) * 0.05, span = (COLS - 1) + (ROWS - 1);
    TW = Math.min((w - pad * 2) / span, (h - top - pad * 2) / (span * ISO_R + ISO_H * 1.3));
    TH = TW * ISO_R; ZS = TW * ISO_H;
    const xmin = -(ROWS - 1) * TW, xmax = (COLS - 1) * TW;
    OFFX = w / 2 - (xmin + xmax) / 2;
    const groundH = span * TH, head = ZS * 1.3;
    OFFY = top + head + ((h - top - groundH - head) / 2);
  }
  function isClosed(a, b) { return state.closed && state.closed.has(ek(a, b)); }

  // ── Map generation ──
  function rand(n) { return Math.floor(Math.random() * n); }
  function parcelFor(id, taken) {
    const p = cr(id), c = p[0], r = p[1];
    const cands = [[c, r], [c - 1, r], [c, r - 1], [c - 1, r - 1]].filter(q => q[0] >= 0 && q[1] >= 0 && q[0] < COLS - 1 && q[1] < ROWS - 1);
    for (const cand of cands) { const k = cand.join(','); if (!taken.has(k)) { taken.add(k); return cand; } }
    return cands[0] || [Math.min(c, COLS - 2), Math.min(r, ROWS - 2)];
  }
  function connected(closed, from) { const seen = new Set([from]), q = [from]; while (q.length) { const u = q.pop(); for (const v of G.adj.get(u)) { if (closed.has(ek(u, v))) continue; if (!seen.has(v)) { seen.add(v); q.push(v); } } } return seen.size === G.nodes.size; }
  function genClosures(garage) {
    const allEdges = []; for (const [id, list] of G.adj) for (const v of list) if (id < v) allEdges.push([id, v]);
    const n = Math.round(allEdges.length * 0.13);
    for (let attempt = 0; attempt < 80; attempt++) {
      const sh = allEdges.slice(); for (let i = sh.length - 1; i > 0; i--) { const j = rand(i + 1); const t = sh[i]; sh[i] = sh[j]; sh[j] = t; }
      const closed = new Set(); for (let i = 0; i < n; i++) closed.add(ek(sh[i][0], sh[i][1]));
      if (connected(closed, garage)) return closed;
    }
    return new Set();
  }
  function genMap() {
    G = makeGrid(COLS, ROWS);
    const ids = [...G.nodes.keys()];
    const pick = (ex, sep) => { for (let t = 0; t < 500; t++) { const id = ids[rand(ids.length)]; if (ex.some(e => nodeDist(e, id) < sep)) continue; return id; } return ids[rand(ids.length)]; };
    const garage = pick([], 0);
    const r0 = pick([garage], 2), r1 = pick([garage, r0], 3);
    const restaurants = [{ id: 0, node: r0, color: REST[0].color, icon: REST[0].icon }, { id: 1, node: r1, color: REST[1].color, icon: REST[1].icon }];
    const used = [garage, r0, r1];
    const houses = [];
    for (let i = 0; i < 3; i++) { const hn = pick(used, 2); used.push(hn); const restId = i < 2 ? i : rand(2); houses.push({ node: hn, restId, color: REST[restId].color, icon: REST[restId].icon, done: false }); }
    const closed = new Set(); // hard closures disabled — they break the freehand road-trace (greedy stepping can't detour)
    state = { garage, restaurants, houses, closed, path: [], drawing: false, finished: false, reviewing: false, night: state ? state.night : false, cars: [] };
    const taken = new Set();
    state.garageParcel = parcelFor(garage, taken);
    restaurants.forEach(r => r.parcel = parcelFor(r.node, taken));
    houses.forEach(h => h.parcel = parcelFor(h.node, taken));
    const bo = bestRoute(); state.optimal = bo.dist; state.bestOrder = bo.order;
    initCars();
  }
  function bestRoute() {
    const items = state.restaurants.map(r => ({ node: r.node, rest: r.id })).concat(state.houses.map(h => ({ node: h.node, need: h.restId })));
    const memo = new Map(); const D = (a, b) => { const k = ek(a, b); if (memo.has(k)) return memo.get(k); const d = dijkstra(G, a, b, state.closed).dist; memo.set(k, d); return d; };
    let best = Infinity, bestOrder = null; const used = new Array(items.length).fill(false), placed = new Set(), order = [];
    function dfs(prev, acc) {
      if (acc >= best) return;
      if (order.length === items.length) { best = acc; bestOrder = order.slice(); return; }
      for (let i = 0; i < items.length; i++) {
        if (used[i]) continue; const it = items[i]; if (it.need !== undefined && !placed.has(it.need)) continue;
        used[i] = true; if (it.rest !== undefined) placed.add(it.rest); order.push(it.node);
        dfs(it.node, acc + D(prev, it.node));
        order.pop(); if (it.rest !== undefined) placed.delete(it.rest); used[i] = false;
      }
    }
    dfs(state.garage, 0);
    return { dist: best, order: bestOrder || [] };
  }

  // ── Route logic ──
  function pathLength() { let d = 0; for (let i = 1; i < state.path.length; i++) d += nodeDist(state.path[i - 1], state.path[i]); return d; }
  function computeDone(fire) {
    const picked = new Set();
    for (const node of state.path) {
      for (const r of state.restaurants) if (r.node === node) picked.add(r.id);
      for (const h of state.houses) if (!h.done && h.node === node && picked.has(h.restId)) { h.done = true; if (fire) onDelivered(h); }
    }
  }
  function recomputeDone() { state.houses.forEach(h => h.done = false); computeDone(false); }
  function onDelivered(h) { const to = parcelCenter(h.parcel); spawnPackage({ x: to.x, y: to.y - ZS * 0.3 }, { x: to.x, y: to.y - ZS * 0.5 }); spawnConfetti(to.x, to.y - ZS * 0.4, '#34d36b'); sfxDing(); if (navigator.vibrate) navigator.vibrate(28); }
  function stepToward(sx, sy) {
    const w = screenToWorld(sx, sy); let moved = false, guard = 0;
    while (guard++ < 400) {
      const tail = state.path[state.path.length - 1], t = cr(tail), tailD = Math.hypot(t[0] - w.x, t[1] - w.y);
      let bestN = null, bestD = tailD - 0.001;
      for (const nb of G.adj.get(tail)) { if (isClosed(tail, nb)) continue; const p = cr(nb), d = Math.hypot(p[0] - w.x, p[1] - w.y); if (d < bestD) { bestD = d; bestN = nb; } }
      if (!bestN) break;
      state.path.push(bestN); moved = true;
    }
    if (moved) computeDone(true);
    return moved;
  }

  // ── Ambient cars ──
  function initCars() {
    state.cars = []; const edges = [];
    for (const [id, list] of G.adj) for (const v of list) if (id < v && !state.closed.has(ek(id, v))) edges.push([id, v]);
    for (let i = 0; i < 4 && edges.length; i++) { const e = edges[rand(edges.length)]; state.cars.push({ a: e[0], b: e[1], t: Math.random(), sp: 0.35 + Math.random() * 0.4, col: ['#e0705f', '#5aa9d6', '#e6c14e', '#9b6fd6'][i % 4] }); }
  }
  function updateCars(dt) {
    for (const c of state.cars) {
      c.t += c.sp * dt;
      if (c.t >= 1) { c.t = 0; c.a = c.b; const nb = G.adj.get(c.b).filter(v => !isClosed(c.b, v)); c.b = nb.length ? nb[rand(nb.length)] : c.a; }
    }
  }

  // ── Audio + particles ──
  function ensureAudio() { if (actx) return; try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  function beep(f, dur, type, vol) { if (!actx) return; const o = actx.createOscillator(), g = actx.createGain(), t = actx.currentTime; o.type = type || 'sine'; o.frequency.value = f; g.gain.setValueAtTime(vol || 0.07, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur); o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t + dur); }
  function sfxStart() { beep(420, 0.12, 'triangle', 0.05); }
  function sfxDing() { beep(880, 0.1, 'sine', 0.08); beep(1320, 0.14, 'sine', 0.04); }
  function sfxWin() { [523, 659, 784, 1047].forEach(f => beep(f, 0.22, 'triangle', 0.06)); }
  function spawnConfetti(x, y, c) { for (let i = 0; i < 24; i++) { const a = (i / 24) * 6.283, sp = 2 + (i % 5); anim.parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2, life: 1, r: 3 + (i % 3), color: ['#ffd23f', '#34d36b', c, '#fff'][i % 4] }); } }
  function spawnStar() { const cx = canvas.width / 2, cy = canvas.height * 0.42; for (let i = 0; i < 48; i++) { const a = (i / 48) * 6.283, sp = 3 + (i % 7); anim.parts.push({ x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1.4, r: 3 + (i % 4), color: ['#ffd23f', '#34d36b', '#2f6fed', '#ec4899', '#fff'][i % 5] }); } }
  function spawnPackage(from, to) { anim.parts.push({ pkg: true, x: from.x, y: from.y, fx: from.x, fy: from.y, tx: to.x, ty: to.y, p: 0 }); }
  function updateParts(dt) {
    for (const p of anim.parts) {
      if (p.pkg) { p.p += dt * 2.4; const e = Math.min(1, p.p); p.x = p.fx + (p.tx - p.fx) * e; p.y = p.fy + (p.ty - p.fy) * e - Math.sin(e * Math.PI) * 30; }
      else { p.vy += 0.16; p.x += p.vx; p.y += p.vy; p.life -= dt * 1.2; }
    }
    anim.parts = anim.parts.filter(p => p.pkg ? p.p < 1.05 : p.life > 0);
  }
  function drawParts() {
    for (const p of anim.parts) {
      if (p.pkg) { ctx.save(); ctx.fillStyle = '#cf9248'; ctx.strokeStyle = '#7c5a3a'; ctx.lineWidth = 2; const s = Math.max(10, ZS * 0.16); ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s); ctx.strokeRect(p.x - s / 2, p.y - s / 2, s, s); ctx.restore(); }
      else { ctx.globalAlpha = Math.max(0, Math.min(1, p.life)); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill(); ctx.globalAlpha = 1; }
    }
  }

  // ── Iso draw helpers ──
  function shade(hex, f) { const n = parseInt(hex.slice(1), 16); let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255; r = Math.min(255, r * f); g = Math.min(255, g * f); b = Math.min(255, b * f); return 'rgb(' + (r | 0) + ',' + (g | 0) + ',' + (b | 0) + ')'; }
  function poly(pts, fill, stroke, lw) { ctx.beginPath(); pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)); ctx.closePath(); if (fill) { ctx.fillStyle = fill; ctx.fill(); } if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1; ctx.stroke(); } }
  function roundRect(x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }
  function shadowDiamond(wx, wy, fw, fh) { const o = 0.09; const c = [iso(wx - fw + o, wy - fh + o), iso(wx + fw + o, wy - fh + o), iso(wx + fw + o, wy + fh + o), iso(wx - fw + o, wy + fh + o)]; ctx.save(); ctx.globalAlpha = 0.15; poly(c, '#0b1020'); ctx.restore(); }
  function box(wx, wy, hw, hh, h, topCol, opts) {
    opts = opts || {};
    const bTR = iso(wx + hw, wy - hh, 0), bBR = iso(wx + hw, wy + hh, 0), bBL = iso(wx - hw, wy + hh, 0);
    const tTL = iso(wx - hw, wy - hh, h), tTR = iso(wx + hw, wy - hh, h), tBR = iso(wx + hw, wy + hh, h), tBL = iso(wx - hw, wy + hh, h);
    poly([bTR, bBR, tBR, tTR], shade(topCol, 0.74));
    poly([bBL, bBR, tBR, tBL], shade(topCol, 0.6));
    poly([tTL, tTR, tBR, tBL], shade(topCol, 1.06));
    if (opts.windows) {
      const lerp = (p, q, t) => ({ x: p.x + (q.x - p.x) * t, y: p.y + (q.y - p.y) * t });
      const wins = (a0, a1, b0, b1) => { for (let i = 0; i < 2; i++) for (let j = 0; j < 3; j++) { const u0 = (i + .24) / 2, u1 = (i + .76) / 2, v0 = (j + .24) / 3, v1 = (j + .76) / 3; const f = (uu, vv) => lerp(lerp(a0, a1, uu), lerp(b0, b1, uu), vv); poly([f(u0, v0), f(u1, v0), f(u1, v1), f(u0, v1)], opts.win); } };
      wins(tTR, tBR, bTR, bBR); wins(tBL, tBR, bBL, bBR);
    }
    return { top: iso(wx, wy, h), tTL, tTR, tBR, tBL };
  }
  function wallRect(wx, wy, hw, hh, h, face, u0, u1, v0, v1, fill) {
    const lerp = (p, q, t) => ({ x: p.x + (q.x - p.x) * t, y: p.y + (q.y - p.y) * t });
    let a, b, at, bt;
    if (face === 'right') { a = iso(wx + hw, wy - hh, 0); b = iso(wx + hw, wy + hh, 0); at = iso(wx + hw, wy - hh, h); bt = iso(wx + hw, wy + hh, h); }
    else { a = iso(wx - hw, wy + hh, 0); b = iso(wx + hw, wy + hh, 0); at = iso(wx - hw, wy + hh, h); bt = iso(wx + hw, wy + hh, h); }
    const f = (uu, vv) => lerp(lerp(at, bt, uu), lerp(a, b, uu), vv);
    poly([f(u0, v0), f(u1, v0), f(u1, v1), f(u0, v1)], fill);
  }
  function drawTree(wx, wy, scale) {
    scale = scale || 1; shadowDiamond(wx, wy, 0.13 * scale, 0.13 * scale);

      state: () => state, pathLength, screenOf: (id) => toScreen(id),
      autoSolve: () => {
        const order = state.bestOrder; state.path = [state.garage]; state.drawing = true;
        for (const n of order) { const p = toScreen(n); stepToward(p.x, p.y); }
        state.drawing = false; computeDone(true); if (state.houses.every(h => h.done)) finish();
        return { you: pathLength(), best: state.optimal, delivered: state.houses.map(h => h.done) };
      },
    };
    console.log('map quest deep booted');
  }
  boot();
})();
</script>
